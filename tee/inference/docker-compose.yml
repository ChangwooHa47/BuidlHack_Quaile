services:
  tee-inference:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      NEAR_AI_API_KEY: "${NEAR_AI_API_KEY:-}"
      NEAR_AI_BASE_URL: "${NEAR_AI_BASE_URL:-https://api.near.ai/v1}"
      NEAR_AI_MODEL: "${NEAR_AI_MODEL:-deepseek-ai/DeepSeek-V3.1}"
      TEE_SIGNER_PRIVKEY: "${TEE_SIGNER_PRIVKEY}"
      TEE_SIGNER_KEY_ID: "${TEE_SIGNER_KEY_ID:-1}"
      NEAR_RPC_URL: "${NEAR_RPC_URL:-https://rpc.testnet.near.org}"
      POLICY_REGISTRY_ACCOUNT: "${POLICY_REGISTRY_ACCOUNT:-policy.testnet}"
      IDO_ESCROW_ACCOUNT: "${IDO_ESCROW_ACCOUNT:-escrow.testnet}"
      EVM_RPCS_JSON: "${EVM_RPCS_JSON:-{}}"
